apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: minio-api-cert
spec:
  secretName: minio-api-cert
  dnsNames:
    - {{ .Values.domain2 }}
    #- www.{{ .Values.domain2 }}
  issuerRef:
    name: lets-encrypt-issuer-prod
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: minio-console-cert
spec:
  secretName: minio-console-cert
  dnsNames:
    - {{ .Values.domain1 }}
    #- www.{{ .Values.domain1 }}
  issuerRef:
    name: lets-encrypt-issuer-prod
    kind: ClusterIssuer
    group: cert-manager.io
