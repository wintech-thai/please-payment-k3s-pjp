apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: admin-cert
spec:
  secretName: admin-cert
  dnsNames:
    - {{ .Values.domain1 }}
    #- www.{{ .Values.domain1 }}
  issuerRef:
    name: lets-encrypt-issuer-prod
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: merchant-cert
spec:
  secretName: merchant-cert
  dnsNames:
    - {{ .Values.domain2 }}
    #- www.{{ .Values.domain2 }}
  issuerRef:
    name: lets-encrypt-issuer-prod
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: api-cert
spec:
  secretName: api-cert
  dnsNames:
    - {{ .Values.domain3 }}
    #- www.{{ .Values.domain3 }}
  issuerRef:
    name: lets-encrypt-issuer-prod
    kind: ClusterIssuer
    group: cert-manager.io
